<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel2: #273449; --brd: #334155;
    --ink: #f1f5f9; --dim: #94a3b8; --faint: #64748b;
    --accent: #3b82f6; --accent2: #60a5fa; --good: #22c55e; --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 320px; font: 13px/1.4 -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { padding: 16px; }
  .head { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .logo { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; }
  .logo svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.2; }
  .title { font-weight: 680; font-size: 13.5px; letter-spacing: -.01em; }
  .sub { color: var(--faint); font-size: 11px; margin-top: 1px; }

  .card { background: var(--panel); border: 1px solid var(--brd); border-radius: 14px; padding: 14px; }
  .running .task { font-weight: 640; font-size: 14px; }
  .running .proj { color: var(--dim); font-size: 11.5px; margin-top: 2px; }
  .clock { font-variant-numeric: tabular-nums; font-weight: 780; font-size: 30px; letter-spacing: .01em; margin: 12px 0 14px; }
  .clock.on { color: var(--accent2); }

  label { display: block; color: var(--dim); font-size: 11px; font-weight: 640; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  select { width: 100%; background: var(--panel2); border: 1px solid var(--brd); color: var(--ink); border-radius: 10px; padding: 9px 10px; font: inherit; }

  .btn { width: 100%; border: none; border-radius: 11px; padding: 11px; font: inherit; font-weight: 680; cursor: pointer; color: #fff; margin-top: 12px; }
  .btn.start { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .btn.stop { background: var(--danger); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .hint { color: var(--faint); font-size: 11.5px; text-align: center; padding: 6px 2px 0; }

  .log { margin-top: 14px; }
  .log h3 { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-top: 1px solid var(--brd); }
  .row:first-of-type { border-top: none; }
  .row .n { color: var(--ink); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 190px; }
  .row .d { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 12px; }
  .empty { color: var(--faint); font-size: 11.5px; padding: 4px 0; }
  .foot { margin-top: 13px; color: var(--faint); font-size: 10.5px; text-align: center; line-height: 1.5; }
  kbd { background: var(--panel2); border: 1px solid var(--brd); border-radius: 5px; padding: 1px 5px; font-size: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M12 5V2M9 2h6"/></svg></div>
    <div>
      <div class="title">TimeTrack Timer</div>
      <div class="sub">Track from any page</div>
    </div>
  </div>
  <div id="main"></div>
  <div class="foot">Shortcut: <kbd>⌘⇧Y</kbd> start/stop · time syncs into the TimeTrack app</div>
</div>
<script src="popup.js"></script>
</body>
</html>
