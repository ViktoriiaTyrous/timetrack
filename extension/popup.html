<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #ffffff; --soft: #f4f5f7; --card: #ffffff; --brd: #e7e8ec;
    --ink: #14161a; --dim: #6b7280; --faint: #9aa1ab;
    --primary: #14161a; --run-bg: #fdecef; --run-brd: #f6c9d3; --run: #e5484d;
    --proj-bg: #f1ecfb; --proj-ink: #7c3aed; --accent: #3b82f6; --accent2: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 340px; font: 13px/1.45 -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { padding: 15px; }
  .head { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
  .logo { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; }
  .logo svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.2; }
  .title { font-weight: 680; font-size: 14px; letter-spacing: -.01em; }

  .bar { margin-bottom: 12px; }
  .newbtn { background: var(--primary); color: #fff; border: none; border-radius: 999px; padding: 9px 16px; font: inherit; font-weight: 640; cursor: pointer; transition: opacity .15s, transform .05s; }
  .newbtn:hover { opacity: .9; }
  .newbtn:active { transform: translateY(1px); }

  .cards { display: flex; flex-direction: column; gap: 10px; }
  .tcard { background: var(--card); border: 1px solid var(--brd); border-radius: 16px; padding: 13px 14px; box-shadow: 0 1px 2px rgba(20,22,26,.03); transition: background .18s, border-color .18s; }
  .tcard.running { background: var(--run-bg); border-color: var(--run-brd); }
  .tc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .tc-name { font-weight: 680; font-size: 14px; letter-spacing: -.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tc-proj { flex-shrink: 0; background: var(--proj-bg); color: var(--proj-ink); font-size: 11px; font-weight: 620; padding: 2px 9px; border-radius: 999px; }
  .tc-row { display: flex; align-items: center; gap: 12px; }
  .pbtn { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--primary); color: #fff; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: transform .05s, box-shadow .18s; }
  .pbtn:active { transform: translateY(1px); }
  .pbtn svg { width: 16px; height: 16px; }
  .tcard.running .pbtn, .tcard.paused .pbtn { background: var(--run); box-shadow: 0 0 0 4px rgba(229,72,77,.14); }
  .tc-time { flex: 1; font-variant-numeric: tabular-nums; font-weight: 720; font-size: 22px; letter-spacing: .01em; }
  .tcard.running .tc-time { color: var(--run); }
  .tcard.paused .tc-time { color: var(--dim); }
  .sbtn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--brd); background: #fff; color: var(--dim); display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: color .15s, border-color .15s; }
  .sbtn:hover { color: var(--run); border-color: var(--run-brd); }
  .sbtn svg { width: 15px; height: 15px; }

  .total { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 13px; border-top: 1px solid var(--brd); color: var(--dim); font-size: 12.5px; }
  .total .tv { font-variant-numeric: tabular-nums; font-weight: 720; font-size: 16px; color: var(--ink); }

  .hint { color: var(--faint); font-size: 12px; text-align: center; padding: 18px 12px; background: var(--soft); border-radius: 14px; line-height: 1.5; }

  .foot { margin-top: 14px; color: var(--faint); font-size: 10.5px; text-align: center; line-height: 1.6; }
  kbd { background: var(--soft); border: 1px solid var(--brd); border-radius: 5px; padding: 1px 5px; font-size: 10px; color: var(--dim); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M12 5V2M9 2h6"/></svg></div>
    <div class="title">TimeTrack Timer</div>
  </div>
  <div id="main"></div>
  <div class="foot">Shortcut: <kbd>⌘⇧Y</kbd> start / stop · syncs into the TimeTrack app</div>
</div>
<script src="popup.js"></script>
</body>
</html>
