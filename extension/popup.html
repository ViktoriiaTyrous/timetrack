<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #14161f; --panel: #1b1e2a; --card: #1e2230; --card-brd: rgba(255,255,255,.08);
    --ink: #f3f4f8; --dim: #a3a9b8; --faint: #6d7382;
    --run: #e5484d; --good: #34d399; --accent: #6366f1; --accent2: #8b5cf6;
    --proj-bg: rgba(255,255,255,.08); --proj-ink: #cdd2e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 340px; font: 13px/1.45 -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { padding: 15px; }
  .head { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .logo { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; }
  .logo svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.2; }
  .title { font-weight: 680; font-size: 14px; letter-spacing: -.01em; }

  .bar { margin-bottom: 12px; }
  .newbtn { background: rgba(255,255,255,.07); color: var(--ink); border: 1px solid var(--card-brd); border-radius: 999px; padding: 8px 15px; font: inherit; font-weight: 620; cursor: pointer; transition: background .15s, transform .05s; }
  .newbtn:hover { background: rgba(255,255,255,.12); }
  .newbtn:active { transform: translateY(1px); }

  .cards { display: flex; flex-direction: column; gap: 9px; }
  .tcard { background: var(--card); border: 1px solid var(--card-brd); border-radius: 15px; }

  /* running hero — matches app live-timer */
  .tcard.running { padding: 14px; position: relative; overflow: hidden;
    background: linear-gradient(150deg, #2a2547, #1a1926 62%); border-color: rgba(139,110,230,.28); }
  .tcard.running::before { content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(70% 130% at 92% -10%, rgba(150,110,235,.32), transparent 58%); }
  .tcard.paused { background: linear-gradient(150deg, #26283a, #191b26 62%); border-color: rgba(255,255,255,.1); }
  .tcard.paused::before { opacity: .35; }
  .rc-head { display: flex; align-items: center; gap: 11px; margin-bottom: 13px; position: relative; }
  .rc-av { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(255,255,255,.22); }
  .rc-meta { min-width: 0; flex: 1; }
  .rc-eyebrow { display: flex; align-items: center; gap: 6px; color: var(--dim); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; }
  .rc-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 3px rgba(52,211,153,.18); animation: pulse 1.8s ease-in-out infinite; }
  .tcard.paused .rc-eyebrow .dot { background: var(--faint); box-shadow: none; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .rc-name { font-weight: 680; font-size: 15px; letter-spacing: -.01em; margin: 4px 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rc-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { background: var(--proj-bg); color: var(--proj-ink); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .rc-timer { display: flex; align-items: center; gap: 10px; position: relative; }
  .rc-clock { flex: 1; font-variant-numeric: tabular-nums; font-weight: 720; font-size: 27px; letter-spacing: .01em; color: #fff; }
  .tcard.paused .rc-clock { color: var(--dim); }
  .rbtn { width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,.12); color: #fff; display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: background .15s, transform .05s; }
  .rbtn:hover { background: rgba(255,255,255,.2); }
  .rbtn:active { transform: translateY(1px); }
  .rbtn.stop { background: rgba(229,72,77,.9); }
  .rbtn.stop:hover { background: var(--run); box-shadow: 0 0 0 4px rgba(229,72,77,.18); }
  .rbtn svg { width: 16px; height: 16px; }

  /* idle row */
  .tcard.idle { display: flex; align-items: center; gap: 11px; padding: 10px 12px; }
  .ti-av { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 12.5px; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(255,255,255,.2); }
  .ti-meta { flex: 1; min-width: 0; }
  .ti-name { font-weight: 620; font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ti-sub { margin-top: 3px; }
  .ti-time { font-variant-numeric: tabular-nums; font-weight: 620; font-size: 13px; color: var(--dim); flex-shrink: 0; }
  .pbtn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--ink); color: var(--bg); display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: transform .05s, opacity .15s; }
  .pbtn:hover { opacity: .88; }
  .pbtn:active { transform: translateY(1px); }
  .pbtn svg { width: 14px; height: 14px; }

  .total { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 13px; border-top: 1px solid var(--card-brd); color: var(--dim); font-size: 12.5px; }
  .total .tv { font-variant-numeric: tabular-nums; font-weight: 720; font-size: 16px; color: var(--ink); }

  .hint { color: var(--dim); font-size: 12px; text-align: center; padding: 18px 14px; background: var(--panel); border: 1px solid var(--card-brd); border-radius: 14px; line-height: 1.55; }

  .foot { margin-top: 14px; color: var(--faint); font-size: 10.5px; text-align: center; line-height: 1.6; }
  kbd { background: rgba(255,255,255,.07); border: 1px solid var(--card-brd); border-radius: 5px; padding: 1px 5px; font-size: 10px; color: var(--dim); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M12 5V2M9 2h6"/></svg></div>
    <div class="title">TimeTrack Timer</div>
  </div>
  <div id="main"></div>
  <div class="foot">Shortcut: <kbd>⌘⇧Y</kbd> start / stop · syncs into the TimeTrack app</div>
</div>
<script src="popup.js"></script>
</body>
</html>
